[tools]
go = "1.26.4"
"aqua:nushell/nushell" = "0.113.1"
"aqua:golangci/golangci-lint" = "2.12.2"
"aqua:mvdan/gofumpt" = "0.10.0"
"aqua:goreleaser/goreleaser" = "2.16.0"
node = "24.16.0"
"npm:htmlhint" = "1.9.2"
"aqua:koalaman/shellcheck" = "0.11.0"

[tasks.build]
description = "Build the htmlup binary into ./bin"
run = "go build -o bin/htmlup ./cmd/htmlup"

[tasks.test]
run = "go test ./..."

[tasks.vet]
run = "go vet ./..."

[tasks.lint]
run = "golangci-lint run"

[tasks.lint-html]
description = "Lint static HTML with htmlhint"
run = "htmlhint docs/site internal/provider/github/templates"

[tasks.lint-sh]
description = "Lint shell scripts with shellcheck"
run = "shellcheck internal/provider/github/templates/cleanup.sh"

[tasks.fmt]
description = "Auto-format with gofumpt"
run = "gofumpt -w ."

[tasks.tidy]
description = "Tidy and verify go.mod / go.sum"
run = "go mod tidy"

[tasks.check]
description = "Everything the pre-commit hook runs"
depends = ["fmt", "vet", "lint", "lint-html", "lint-sh", "test"]

[tasks.pre-commit]
depends = ["check"]
