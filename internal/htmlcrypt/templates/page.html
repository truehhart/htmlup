<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Protected page</title>
<style>
  :root {
    --bg: #0a0c10;
    --bg-soft: #11141b;
    --panel: #0f1218;
    --border: #1e2430;
    --border-hi: #2b3342;
    --fg: #d7dde7;
    --fg-dim: #8b94a3;
    --fg-faint: #5b6373;
    --accent: #7ee787;
    --accent-2: #58a6ff;
    --accent-3: #d2a8ff;
    --radius: 12px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: var(--sans);
    color: var(--fg);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(88, 166, 255, 0.1), transparent 60%),
      radial-gradient(700px 400px at 0% 0%, rgba(126, 231, 135, 0.08), transparent 55%),
      var(--bg);
  }
  .box {
    width: min(22rem, 90vw);
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 28px 26px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: linear-gradient(180deg, var(--bg-soft), var(--panel));
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
  }
  .brand {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: -0.02em;
  }
  .brand .prompt { color: var(--accent); }
  .brand .up {
    background: linear-gradient(120deg, var(--accent), var(--accent-2) 60%, var(--accent-3));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  h1 {
    font-size: 1rem;
    font-weight: 600;
    margin: 0;
    color: var(--fg);
  }
  .lead { margin: -0.5rem 0 0; color: var(--fg-dim); font-size: 0.88rem; }
  form { display: flex; flex-direction: column; gap: 0.75rem; }
  input {
    padding: 0.65rem 0.7rem;
    border-radius: 10px;
    border: 1px solid var(--border-hi);
    background: var(--bg);
    color: var(--fg);
    font-size: 1rem;
    font-family: var(--mono);
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    padding: 0.65rem;
    border: 1px solid var(--accent);
    border-radius: 10px;
    background: var(--accent);
    color: #05210a;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  button:hover { box-shadow: 0 6px 20px rgba(126, 231, 135, 0.25); transform: translateY(-1px); }
  button:disabled { opacity: 0.6; cursor: progress; transform: none; box-shadow: none; }
  .err { color: #f87171; font-size: 0.85rem; min-height: 1.1em; }
</style>
</head>
<body>
<div class="box">
  <div class="brand"><span class="prompt">$ </span>html<span class="up">up</span></div>
  <h1>This page is password-protected</h1>
  <form id="f">
    <input id="p" type="password" placeholder="Password" autocomplete="current-password">
    <button id="b" type="submit">Unlock</button>
    <div class="err" id="e"></div>
  </form>
</div>
<script>
// Blob layout (base64-decoded): salt(16) || nonce(12) || ciphertext+GCM-tag.
// These offsets and the iteration count are produced by internal/htmlcrypt; keep
// them in lockstep with that package (ITER is injected from the Go constant).
const BLOB = "{{.Blob}}";
const ITER = {{.Iterations}};
const enc = new TextEncoder();
// don't autofocus when embedded in an iframe — it scrolls the parent page
if (window.self === window.top) document.getElementById("p").focus();
function bytes(b64) {
  const raw = atob(b64), a = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) a[i] = raw.charCodeAt(i);
  return a;
}
document.getElementById("f").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById("b"), err = document.getElementById("e");
  err.textContent = ""; btn.disabled = true;
  try {
    const blob = bytes(BLOB), salt = blob.slice(0, 16), iv = blob.slice(16, 28), ct = blob.slice(28);
    const base = await crypto.subtle.importKey("raw", enc.encode(document.getElementById("p").value), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: ITER, hash: "SHA-256" }, base, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  } catch (e) {
    err.textContent = "Wrong password"; btn.disabled = false;
  }
});
</script>
</body>
</html>
