# Installed by htmlup (`htmlup github setup`).
# Periodically deletes published files/directories older than the configured
# TTL from the Pages branch, based on each entry's last commit date.
name: htmlup-cleanup
run-name: htmlup-cleanup (older than {{TTL_DAYS}}d)

on:
  schedule:
    - cron: '{{CRON}}'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: '[Setup] | Checkout Pages branch'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: '{{BRANCH}}'
          fetch-depth: 0

      - name: '[Cleanup] | Remove entries older than TTL'
        shell: bash -euo pipefail {0}
        env:
          TTL_DAYS: '{{TTL_DAYS}}'
          BRANCH: '{{BRANCH}}'
          EXCLUDE_PATTERNS: '{{EXCLUDE}}'
          # Lets the script create a GitHub-signed cleanup commit via the API.
          GH_TOKEN: ${{ github.token }}
        run: |
          {{CLEANUP_SCRIPT}}
