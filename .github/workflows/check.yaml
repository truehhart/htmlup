name: check
run-name: check ${{ github.ref_name }}

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: '[Setup] | Checkout'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: '[Setup] | Mise'
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: '[Lint] | Format check'
        shell: bash -euo pipefail {0}
        run: |
          gofumpt -l . | tee /tmp/fmt.out
          test ! -s /tmp/fmt.out

      - name: '[Lint] | Vet'
        shell: bash -euo pipefail {0}
        run: go vet ./...

      - name: '[Lint] | golangci-lint'
        shell: bash -euo pipefail {0}
        run: golangci-lint run

      - name: '[Lint] | HTML'
        shell: bash -euo pipefail {0}
        run: htmlhint docs internal/provider/github/templates

      - name: '[Lint] | Shell'
        shell: bash -euo pipefail {0}
        run: shellcheck internal/provider/github/templates/cleanup.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - name: '[Setup] | Checkout'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: '[Setup] | Mise'
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: '[Setup] | Download modules'
        shell: bash -euo pipefail {0}
        run: go mod download

      - name: '[Test] | Run tests'
        shell: bash -euo pipefail {0}
        run: go test ./...
