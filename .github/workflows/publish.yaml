name: publish
run-name: publish ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: '[Setup] | Checkout'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: '[Setup] | Mise'
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: '[Setup] | Cosign'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: '[Setup] | Import GPG key'
        shell: bash -euo pipefail {0}
        run: echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      # Tap-scoped token for GoReleaser's cross-repo cask push — GITHUB_TOKEN can't.
      - name: '[Setup] | Mint Homebrew tap token'
        id: tap-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: truehhart
          repositories: homebrew-tap

      - name: '[Publish] | GoReleaser'
        shell: bash -euo pipefail {0}
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
