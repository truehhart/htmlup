name: release
run-name: release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without the leading v (e.g. 1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: '[Validate] | Version format'
        shell: bash -euo pipefail {0}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::'$VERSION' is not semver MAJOR.MINOR.PATCH (no leading v)"
            exit 1
          fi

  check:
    needs: validate
    uses: ./.github/workflows/check.yaml
    permissions:
      contents: read

  tag:
    needs: check
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      # App token, not GITHUB_TOKEN — a GITHUB_TOKEN push won't trigger publish.yaml.
      - name: '[Setup] | Mint release token'
        id: token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: '[Setup] | Checkout'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.token.outputs.token }}

      - name: '[Release] | Create and push tag'
        shell: bash -euo pipefail {0}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
