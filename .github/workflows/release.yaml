name: Release
run-name: Release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without the leading v (e.g. 1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: '[Validate] | Version format'
        shell: bash -euo pipefail {0}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::'$VERSION' is not semver MAJOR.MINOR.PATCH (no leading v)"
            exit 1
          fi

  check:
    needs: validate
    uses: ./.github/workflows/check.yaml
    permissions:
      contents: read

  publish:
    needs: check
    uses: ./.github/workflows/publish.yaml
    permissions:
      contents: write
      id-token: write
    secrets: inherit
    with:
      version: ${{ inputs.version }}
