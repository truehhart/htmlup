name: Release

# Tag-triggered release orchestrator: runs the check suite, then publishes
# artifacts only if checks pass. Both stages are reusable workflows in this repo.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  check:
    uses: ./.github/workflows/check.yaml
    permissions:
      contents: read

  publish:
    needs: check
    uses: ./.github/workflows/publish.yaml
    permissions:
      contents: write
      id-token: write
    secrets: inherit
