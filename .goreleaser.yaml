version: 2

builds:
  - main: ./cmd/htmlup
    binary: htmlup
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: archive
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
  - id: binary
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

signs:
  - id: cosign
    cmd: cosign
    args:
      - sign-blob
      - "--output-signature={{ .Signature }}"
      - "--output-certificate={{ .Certificate }}"
      - "--yes"
      - "{{ .Artifact }}"
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"

  - id: gpg
    cmd: gpg
    args:
      - "--batch"
      - "--pinentry-mode=loopback"
      - "--passphrase-fd=0"
      - "--detach-sign"
      - "--output"
      - "{{ .Signature }}"
      - "{{ .Artifact }}"
    artifacts: checksum
    signature: "${artifact}.gpgsig"
    stdin: "{{ .Env.GPG_PASSPHRASE }}"

# Release notes are generated by the GitHub release action
# (generate_release_notes: true in publish.yaml), so GoReleaser's own changelog
# is intentionally not configured here.
