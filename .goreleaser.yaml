version: 2

builds:
  - main: ./cmd/htmlup
    binary: htmlup
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: archive
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
  - id: binary
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - name: htmlup
    # Pull from the tar.gz archive, not the standalone-binary archive.
    ids: [archive]
    binaries:
      - htmlup
    repository:
      owner: truehhart
      name: homebrew-tap
      branch: master
      # Short-lived GitHub App installation token minted in publish.yaml; the
      # default GITHUB_TOKEN is scoped to this repo and can't push to the tap.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/truehhart/htmlup"
    description: "Upload HTML pages and make them publicly available"
    # Omit the committer so GitHub auto-signs the API commit as the App itself,
    # showing as verified. Relies on the tap push using a GitHub App token.
    commit_author:
      use_github_app_token: true
    hooks:
      post:
        # The binaries aren't Apple-notarized, so strip the Gatekeeper
        # quarantine xattr on macOS; skipped on Linux via the OS guard.
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/htmlup"]
          end

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

signs:
  - id: cosign
    cmd: cosign
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "--yes"
      - "${artifact}"
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"

  - id: gpg
    cmd: gpg
    args:
      - "--batch"
      - "--pinentry-mode=loopback"
      - "--passphrase-fd=0"
      - "--detach-sign"
      - "--output"
      - "${signature}"
      - "${artifact}"
    artifacts: checksum
    signature: "${artifact}.gpgsig"
    stdin: "{{ .Env.GPG_PASSPHRASE }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

release:
  # Re-running a release for an existing tag replaces the release and its
  # artifacts, so a retried/failed run lands cleanly instead of erroring.
  mode: replace
